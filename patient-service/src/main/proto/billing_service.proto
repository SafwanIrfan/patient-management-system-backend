/// This proto file describes how to interact with grpc server that
/// runs in billing service

syntax = "proto3";

// this tells that add a maven plugin for generating separate
// files instead of having all of the classes generated under
// single parent class as it makes it harder to work with
option java_multiple_files = true;

option java_package = "billing";

service BillingService {
  rpc CreateBillingAccount (BillingRequest) returns (BillingResponse);
}

message BillingRequest {
  string patientId = 1;
  string name = 2;
  string email = 3;
}

message BillingResponse {
  string accountId = 1;
  string status = 2;
}